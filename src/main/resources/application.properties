
# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/farmconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=#Reshnavi16
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# Logging
logging.level.root=INFO
logging.level.com.farmconnect=DEBUG
logging.level.org.springframework.security=DEBUG

# JWT Configuration
jwt.secret=your_super_secret_jwt_key_at_least_32_characters_long_here
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true

# File Upload
file.upload-dir=./uploads
file.max-size=10485760

# Pagination
app.pagination.default-size=20
app.pagination.max-size=100

# Application Info
spring.application.name=FarmConnect API
server.error.include-message=always
server.error.include-binding-errors=always